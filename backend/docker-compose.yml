services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: teslapp-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "TeslApp_Str0ng!Pass"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "TeslApp_Str0ng!Pass" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: teslapp-backend
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: TeslApp
      DB_USER: sa
      DB_PASSWORD: TeslApp_Str0ng!Pass
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

volumes:
  sqlserver_data:
